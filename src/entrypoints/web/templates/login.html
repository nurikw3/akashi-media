{% extends "base.html" %}
{% block title %}Вход — AkashiMedia{% endblock %}
{% block body %}
<main class="auth" aria-labelledby="auth-heading">
  <div class="auth__panel">
    <p class="brand-mark">明 AkashiMedia</p>
    <h1 id="auth-heading" class="auth__title">Транзитный шлюз<br />публикаций</h1>
    <p class="auth__subtitle">Доступ для отдела маркетинга</p>

    {% if error %}
    <p class="alert alert--error" role="alert">{{ error }}</p>
    {% endif %}

    <form class="auth__form" method="post" action="/login" autocomplete="off">
      <label class="field">
        <span class="field__label">Логин</span>
        <input class="field__input" type="text" name="username" required autofocus />
      </label>
      <label class="field">
        <span class="field__label">Пароль</span>
        <input class="field__input" type="password" name="password" required />
      </label>
      <button class="btn btn--primary btn--block" type="submit">Войти</button>
    </form>
  </div>
</main>
{% endblock %}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: akashimedia
      POSTGRES_USER: akashimedia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-akashimedia_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akashimedia -d akashimedia"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build: .
    restart: "no"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://akashimedia:${POSTGRES_PASSWORD:-akashimedia_dev}@db:5432/akashimedia
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://akashimedia:${POSTGRES_PASSWORD:-akashimedia_dev}@db:5432/akashimedia
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
    command: uvicorn src.config:create_app --factory --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram-bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://akashimedia:${POSTGRES_PASSWORD:-akashimedia_dev}@db:5432/akashimedia
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:?TELEGRAM_CHANNEL_ID is required}
      TELEGRAM_CONTROL_CHAT_ID: ${TELEGRAM_CONTROL_CHAT_ID:?TELEGRAM_CONTROL_CHAT_ID is required}
      TAVILY_API_KEY: ${TAVILY_API_KEY:?TAVILY_API_KEY is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
    command: python -m src.entrypoints.telegram.bot
    depends_on:
      migrate:
        condition: service_completed_successfully

  digest-worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://akashimedia:${POSTGRES_PASSWORD:-akashimedia_dev}@db:5432/akashimedia
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:?TELEGRAM_CHANNEL_ID is required}
      TAVILY_API_KEY: ${TAVILY_API_KEY:?TAVILY_API_KEY is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
    command: python -m src.entrypoints.digest.worker
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
